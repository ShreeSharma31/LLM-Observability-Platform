services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://llm_user:llm_pass@db:5432/llm_obs
      CORS_ORIGINS: "*"
      API_KEY_ENABLED: "false"
      HIGH_COST_THRESHOLD: "0.1"
      HIGH_LATENCY_THRESHOLD_MS: "2000"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_obs
      POSTGRES_USER: llm_user
      POSTGRES_PASSWORD: llm_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
